<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancer Hybrid Model</title>
    <style>
        body {
            background-color: #f0f3f6;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            max-width: 900px;
            width: 100%;
        }
        .panel {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 16px;
            text-align: center;
        }
        h3 {
            margin: 0 0 12px 0;
            color: #2c3e50;
            font-size: 1rem;
            font-weight: 600;
        }
        canvas {
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="panel">
            <h3>1. Tumor Morphology (Green: Alive, Red: Apoptosis, Blue: Necrosis (Starvation), White: Empty (Between Cells))</h3>
            <canvas id="tumorCanvas" width="400" height="400"></canvas>
        </div>
        <div class="panel">
            <h3>2. Oxygen Concentration Profile (Bright Blue: High O2)</h3>
            <canvas id="oxygenCanvas" width="400" height="400"></canvas>
        </div>
        <div class="panel">
            <h3>3. Glucose Concentration Profile (Bright Orange: High C6H12O6)</h3>
            <canvas id="glucoseCanvas" width="400" height="400"></canvas>
        </div>
        <div class="panel">
            <h3>4. Acidity Profile (Bright Red = High Acidity / Low pH)</h3>
            <canvas id="acidCanvas" width="400" height="400"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
