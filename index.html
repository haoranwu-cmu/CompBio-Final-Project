<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Radiotherapy Planning | Computational Oncology</title>
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-surface: #141b2d;
            --bg-card: #1e2942;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-green: #4ade80;
            --accent-purple: #c084fc;
            --accent-red: #f87171;
            --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Controls & Metrics */
        .sidebar { width: 380px; background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .header { padding: 20px; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 5px; }
        .header p { font-size: 0.8rem; color: var(--text-muted); }
        
        .section { padding: 20px; border-bottom: 1px solid var(--border); }
        .section h2 { font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; letter-spacing: 0.5px; }
        
        select { width: 100%; padding: 10px; background: var(--bg-card); border: 1px solid var(--border); color: white; border-radius: 6px; font-size: 0.95rem; cursor: pointer; }
        
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .metric-card { background: var(--bg-card); padding: 12px; border-radius: 6px; border: 1px solid var(--border); }
        .metric-card.full { grid-column: span 2; }
        .metric-value { font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-top: 4px; }
        .metric-value.green { color: var(--accent-green); }
        .metric-label { font-size: 0.75rem; color: var(--text-muted); }
        
        .layer-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex: 1; }
        .layer-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg-card); padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border); font-size: 0.85rem; }
        .layer-item label { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .color-box { width: 14px; height: 14px; border-radius: 3px; }
        .dot-gradient { background: linear-gradient(90deg, #1e3a8a, #3b82f6, #ef4444); border-radius: 50%; }
        input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; }
        
        /* 3D Viewport */
        .viewport-container { flex: 1; position: relative; background: radial-gradient(circle at center, #18223c 0%, #0a0e17 100%); }
        #canvas3d { width: 100%; height: 100%; display: block; }
        
        .loading-overlay { position: absolute; inset: 0; background: rgba(10, 14, 23, 0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; transition: opacity 0.3s; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
</head>
<body>

    <div class="sidebar">
        <div class="header">
            <h1>Reaction-Diffusion RT</h1>
            <p>D3Q7 Lattice-Boltzmann & MH Optimization</p>
        </div>

        <div class="section">
            <h2>Patient Selection</h2>
            <select id="patientSelect" onchange="loadPatient(this.value)">
                <option value="">Loading Patient Registry...</option>
            </select>
        </div>

        <div class="section">
            <h2>Quantitative Evaluation</h2>
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Spatial Dice (sDSC)</div>
                    <div class="metric-value" id="valDice">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">95th-Hausdorff</div>
                    <div class="metric-value" id="valHD">--</div>
                </div>
                <div class="metric-card full">
                    <div class="metric-label">Tumor Cell Reduction (vs Standard 60 Gy)</div>
                    <div class="metric-value green" id="valReduction">--%</div>
                </div>
            </div>
        </div>

        <div class="section" style="flex: 1; border-bottom: none; display: flex; flex-direction: column;">
            <h2>Anatomical & Dosimetric Layers</h2>
            <div class="layer-list" id="layerControls">
                </div>
        </div>
    </div>

    <div class="viewport-container">
        <div id="loading" class="loading-overlay">
            <div class="spinner"></div>
            <p id="loadingText" style="color: var(--text-muted); font-size: 0.9rem;">Initializing WebGL Engine...</p>
        </div>
        <canvas id="canvas3d"></canvas>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let loadedMeshes = {};
        let globalCenter = new THREE.Vector3();

        // Updated Configuration accommodating distinct geometric meshes and dot gradient point clouds
        const LAYERS = [
            { id: "00_brain_mesh.obj", name: "Whole Brain Parenchyma", color: 0xaaaaaa, opacity: 0.1, default: true, type: "mesh" },
            { id: "00_oar_mesh.obj", name: "Organs At Risk (OARs)", color: 0x38bdf8, opacity: 0.25, default: true, type: "mesh" },
            { id: "01_clinical_t1c_core.obj", name: "Pre-Op T1Gd Core", color: 0xff4d4d, opacity: 0.8, default: false, type: "mesh" },
            { id: "02_clinical_flair_edema.obj", name: "Pre-Op T2-FLAIR Edema", color: 0xffa64d, opacity: 0.2, default: false, type: "mesh" },
            { id: "03_model_predicted_density_tau2.obj", name: "Predicted Tumor (u ≥ τ₂)", color: 0xb84dff, opacity: 0.6, default: false, type: "mesh" },
            { id: "04_corrected_dose.json", name: "Corrected Dose (3D Dots)", default: true, type: "points" },
            { id: "06_expected_result_true_recurrence.obj", name: "True Recurrence Mass", color: 0x4de680, opacity: 0.4, default: false, type: "mesh" }
        ];

        function init3D() {
            const canvas = document.getElementById('canvas3d');
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(canvas.parentElement.clientWidth, canvas.parentElement.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, canvas.parentElement.clientWidth / canvas.parentElement.clientHeight, 1, 1000);
            camera.position.set(200, 200, 200);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(100, 200, 100);
            scene.add(dirLight);

            window.addEventListener('resize', onWindowResize);
            animate();
            setupLayerUI();
            fetchPatientRegistry();
        }

        function setupLayerUI() {
            const container = document.getElementById('layerControls');
            container.innerHTML = '';
            LAYERS.forEach(l => {
                let colorPreview = '';
                if (l.type === 'points') {
                    colorPreview = `<div class="color-box dot-gradient"></div>`;
                } else {
                    const hexColor = '#' + l.color.toString(16).padStart(6, '0');
                    colorPreview = `<div class="color-box" style="background: ${hexColor}"></div>`;
                }
                container.innerHTML += `
                    <div class="layer-item">
                        <label>
                            <input type="checkbox" id="chk_${l.id}" ${l.default ? 'checked' : ''} onchange="toggleLayer('${l.id}', this.checked)">
                            ${colorPreview}
                            <span>${l.name}</span>
                        </label>
                    </div>
                `;
            });
        }

        async function fetchPatientRegistry() {
            try {
                const res = await fetch('web_assets/patients.json');
                const patients = await res.json();
                const select = document.getElementById('patientSelect');
                select.innerHTML = patients.map(p => `<option value="${p}">${p}</option>`).join('');
                if (patients.length > 0) loadPatient(patients[0]);
            } catch (e) {
                document.getElementById('loadingText').innerText = "Error: Please run 'python app.py --serve' to host web assets.";
            }
        }

        async function loadPatient(patientId) {
            if (!patientId) return;
            const loaderOverlay = document.getElementById('loading');
            loaderOverlay.classList.remove('hidden');
            document.getElementById('loadingText').innerText = `Loading Assets for ${patientId}...`;

            // Clear previous meshes safely
            Object.values(loadedMeshes).forEach(mesh => scene.remove(mesh));
            loadedMeshes = {};

            // Fetch Evaluation Metrics
            try {
                const metRes = await fetch(`web_assets/${patientId}/evaluation_metrics.json`);
                const metrics = await metRes.json();
                document.getElementById('valDice').innerText = metrics.Spatial_Accuracy.Dice_Similarity_Coefficient;
                document.getElementById('valHD').innerText = `${metrics.Spatial_Accuracy.Symmetric_Hausdorff_Distance_mm} mm`;
                document.getElementById('valReduction').innerText = `+${metrics.Dosimetric_Superiority.Tumor_Cell_Reduction_vs_Standard_Pct}%`;
            } catch (e) {
                console.warn("Could not load metrics JSON.");
            }

            const objLoader = new THREE.OBJLoader();
            
            // Await all layers to calculate a synchronous and shared global centering mechanism
            const layerPromises = LAYERS.map(async (layer) => {
                try {
                    let loadedObject = null;
                    if (layer.type === "mesh") {
                        const obj = await new Promise((resolve, reject) => {
                            objLoader.load(`web_assets/${patientId}/${layer.id}`, resolve, undefined, reject);
                        });
                        
                        const material = new THREE.MeshPhongMaterial({
                            color: layer.color,
                            transparent: true,
                            opacity: layer.opacity,
                            side: THREE.DoubleSide,
                            depthWrite: false
                        });

                        obj.traverse(child => { if (child.isMesh) child.material = material; });
                        loadedObject = obj;
                        
                    } else if (layer.type === "points") {
                        // Dynamically render a point cloud mapped exactly to mathematical dose value [0, 60]
                        const res = await fetch(`web_assets/${patientId}/${layer.id}`);
                        const data = await res.json();
                        
                        const geometry = new THREE.BufferGeometry();
                        const positions = [];
                        const colors = [];
                        
                        data.forEach(pt => {
                            positions.push(pt[0], pt[1], pt[2]);
                            const doseVal = pt[3];
                            
                            const color = new THREE.Color();
                            // Color mapping: 60Gy = Red (H:0), 0Gy = Blue (H:0.66)
                            const hue = 0.66 * (1.0 - Math.min(doseVal / 60.0, 1.0));
                            color.setHSL(hue, 1.0, 0.5);
                            colors.push(color.r, color.g, color.b);
                        });
                        
                        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                        
                        const material = new THREE.PointsMaterial({ 
                            size: 1.5, 
                            vertexColors: true, 
                            transparent: true, 
                            opacity: 0.7 
                        });
                        
                        loadedObject = new THREE.Points(geometry, material);
                    }
                    
                    return { id: layer.id, obj: loadedObject };
                } catch (e) {
                    console.warn(`Layer missing or failed to process: ${layer.id}`, e);
                    return { id: layer.id, obj: null };
                }
            });

            const results = await Promise.all(layerPromises);

            // Compute global alignment center using the absolute geometry of the whole brain
            const brainData = results.find(r => r.id === "00_brain_mesh.obj");
            if (brainData && brainData.obj) {
                const box = new THREE.Box3().setFromObject(brainData.obj);
                box.getCenter(globalCenter);
            }

            // Reposition and visualize dynamically
            results.forEach(res => {
                if (res.obj) {
                    res.obj.position.sub(globalCenter);
                    const checkbox = document.getElementById(`chk_${res.id}`);
                    res.obj.visible = checkbox ? checkbox.checked : false;
                    scene.add(res.obj);
                    loadedMeshes[res.id] = res.obj;
                }
            });

            loaderOverlay.classList.add('hidden');
        }

        function toggleLayer(layerId, isVisible) {
            if (loadedMeshes[layerId]) loadedMeshes[layerId].visible = isVisible;
        }

        function onWindowResize() {
            const container = document.getElementById('canvas3d').parentElement;
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init3D;
    </script>
</body>
</html>
